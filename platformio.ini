; BLE Keyboard Proxy — ESP32-S3-DevKitC-1-N16R8
;
; Computer --USB CDC serial--> ESP32-S3 --BLE HID--> phone/tablet
;
; https://docs.platformio.org/page/projectconf.html

; `pio run` alone must still just build the firmware. Without this, adding
; [env:native] below makes a bare `pio run` try to build src/ under the native
; toolchain too, which fails (no Arduino/BLE headers there). Explicit `-e native`
; or `pio test -e native` still reach it.
[platformio]
default_envs = esp32-s3-devkitc-1

[env:esp32-s3-devkitc-1]
platform = espressif32@6.3.2
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
; The UART port on this board is a CH343 (1A86:55D3), not the CP2102 the docs suggest.
; It works via the macOS built-in driver and has real DTR/RTS auto-reset, so uploads need
; no BOOT/RESET button dance — unlike the native USB port. Globbed rather than pinned to
; the full name so a re-enumeration doesn't break the build; the pattern excludes the
; Bluetooth serial ports that would otherwise confuse auto-detection.
upload_port = /dev/cu.usbmodem*
monitor_port = /dev/cu.usbmodem*

; The stock board def is the N8 (8MB, no PSRAM); this hardware is the N16R8.
; PSRAM is deliberately left off — nothing here needs it, and a wrong octal-PSRAM
; setting causes boot loops. Add board_build.arduino.memory_type = qio_opi if that
; ever changes.
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; CDC_ON_BOOT=0 keeps Serial on UART0, which is what the CH343 bridge above is wired to.
; Setting it to 1 routes Serial to the native USB port instead — verified empirically:
; with =1 the ROM banner still appeared on UART0 but no application output ever did.
; Flip this back to 1 only if the cable moves to the native USB port.
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=0
  ; NimBLE rather than Bluedroid. Not a preference — Bluedroid could not serve HID to
  ; this phone at all: it completed bonding (LENC/PENC/LID/PID all distributed,
  ; AUTH_CMPL fired) but then failed BTM_GetSecurityFlags on the peer's resolvable
  ; private address and rejected every HID characteristic access with
  ; GATT_INSUF_AUTHENTICATION. Non-encrypted reads (battery) succeeded throughout.
  ; Erasing NVS and re-bonding from scratch did not help, ruling out stale bonds.
  ; NimBLE resolves peer identity correctly. It also uses less RAM/flash.
  -DUSE_NIMBLE
  -DCORE_DEBUG_LEVEL=0
  ; Four bond slots, not NimBLE's default 3 — one per device the proxy can hold
  ; a bond with. Must match kSlotCount in src/slot_address.h.
  -DCONFIG_BT_NIMBLE_MAX_BONDS=4

; Pinned to a commit, not bare master — an upstream push must not silently change our
; build. Master rather than the newest tag (0.3.2-beta, long stale): sendReport() and the
; KEY_MEDIA_* layout this project depends on were verified against master's header.
; Bluedroid (default) rather than NimBLE: T-vK's USE_NIMBLE path needs NimBLE-Arduino
; pinned to ^1.4.3 (2.x broke the API), a constraint we don't need at this size.
; NimBLE pinned to 1.4.x: T-vK's USE_NIMBLE path targets the 1.x API and does not
; compile against NimBLE-Arduino 2.x.
lib_deps =
  https://github.com/T-vK/ESP32-BLE-Keyboard.git#b7aaf9bb711a04216e4417f1e2a6b0ee0eaeaf66
  h2zero/NimBLE-Arduino@^1.4.3

; Host-side unit tests for the pure logic — address derivation and the line
; parser — neither of which needs a board. `test_build_src = no` keeps src/ out
; of the native build, since everything else in there pulls in Arduino.
[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17
test_build_src = no
